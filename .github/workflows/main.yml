name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Criar projeto
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force src

          @'
          {
            "name": "brasilxmaster-bridge",
            "version": "1.0.0",
            "main": "src/main.js",
            "scripts": {
              "pack": "electron-packager . BrasilXMaster-Bridge --platform=win32 --arch=x64 --out=release --overwrite"
            },
            "dependencies": {
              "cors": "2.8.5",
              "express": "4.18.3",
              "electron": "29.4.6"
            },
            "devDependencies": {
              "electron-packager": "17.1.2"
            }
          }
          '@ | Out-File package.json -Encoding utf8

          @'
          const { app, BrowserWindow } = require("electron");
          const express = require("express");
          const cors = require("cors");

          const SITE_URL = "https://brasilxmaster.com.br";
          const PORT = 9999;

          function startBridge() {
            const api = express();

            api.use(cors({
              origin: "*",
              methods: ["GET", "POST", "OPTIONS"],
              allowedHeaders: ["Content-Type", "Authorization"]
            }));

            api.use(express.json());

            const status = {
              ok: true,
              detected: true,
              connected: true,
              software: "BrasilXMaster Bridge",
              name: "BrasilXMaster Bridge",
              version: "1.0.0",
              status: "online",
              port: 9999
            };

            api.get("/", (req, res) => res.json(status));
            api.get("/detect", (req, res) => res.json(status));
            api.get("/health", (req, res) => res.json(status));
            api.get("/status", (req, res) => res.json(status));
            api.get("/ping", (req, res) => res.json(status));

            api.get("/interfaces", (req, res) => {
              res.json({
                ok: true,
                detected: true,
                software: "BrasilXMaster Bridge",
                interfaces: [],
                message: "Bridge online em localhost:9999"
              });
            });

            api.post("/hardware/connect", (req, res) => {
              res.json({
                ok: true,
                detected: true,
                message: "Comando recebido",
                received: req.body
              });
            });

            api.listen(PORT, () => {
              console.log("BrasilXMaster Bridge rodando na porta " + PORT);
            });
          }

          function createWindow() {
            const win = new BrowserWindow({
              width: 1400,
              height: 900,
              title: "BrasilXMaster Bridge"
            });

            win.maximize();
            win.loadURL(SITE_URL);
          }

          app.whenReady().then(() => {
            startBridge();
            createWindow();
          });

          app.on("window-all-closed", () => {
            app.quit();
          });
          '@ | Out-File src/main.js -Encoding utf8

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Gerar aplicativo Windows
        run: npm run pack

      - name: Compactar resultado
        shell: powershell
        run: Compress-Archive -Path release\* -DestinationPath BrasilXMaster-Bridge-Windows.zip

      - name: Enviar para download
        uses: actions/upload-artifact@v4
        with:
          name: BrasilXMaster-Bridge-Windows
          path: BrasilXMaster-Bridge-Windows.zip

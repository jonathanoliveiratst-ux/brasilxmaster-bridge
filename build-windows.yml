name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Gerar EXE
        run: npm run dist

      - name: Enviar EXE pronto para download
        uses: actions/upload-artifact@v4
        with:
          name: BrasilXMaster-Bridge-Windows-EXE
          path: dist/*
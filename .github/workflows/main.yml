name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Criar estrutura do projeto
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force src
          
          $package = @{
            name = "brasilxmaster-bridge"
            version = "1.0.0"
            main = "src/main.js"
            scripts = @{
              pack = "electron-builder --win --publish never"
            }
            dependencies = @{
              express = "^4.18.3"
              cors = "^2.8.5"
              serialport = "^9.2.8"
              usb = "^1.11.0"
            }
            devDependencies = @{
              electron = "^27.0.0"
              "electron-builder" = "^24.6.4"
            }
          } | ConvertTo-Json
          $package | Out-File package.json -Encoding utf8

      - name: Criar main.js
        shell: powershell
        run: |
          $code = @'
/* eslint-disable no-undef */
const { app, BrowserWindow } = require("electron");
const express = require("express");
const cors = require("cors");
const { SerialPort } = require("serialport");
const usb = require("usb");

const SITE_URL = "https://brasilxmaster.com.br";
const PORT = 9999;

async function discoverDevices() {
  const devices = [];
  try {
    const ports = await SerialPort.list();
    ports.forEach(port => {
      devices.push({
        type: "serial",
        port: port.path,
        manufacturer: port.manufacturer || "Unknown",
        description: port.description || "Serial Port",
        productId: port.productId,
        vendorId: port.vendorId,
        baudRate: 115200
      });
    });
  } catch (err) {
    console.error("Erro ao listar portas seriais:", err.message);
  }
  return devices;
}

function startBridge() {
  const api = express();

  api.use(cors({
    origin: "*",
    methods: ["GET", "POST", "OPTIONS"],
    allowedHeaders: ["Content-Type", "Authorization"]
  }));

  api.use(express.json());

  const status = {
    ok: true,
    detected: true,
    connected: true,
    software: "BrasilXMaster Bridge",
    name: "BrasilXMaster Bridge",
    version: "1.0.0",
    status: "online",
    port: PORT
  };

  api.get("/", (req, res) => res.json(status));
  api.get("/detect", (req, res) => res.json(status));
  api.get("/health", (req, res) => res.json(status));
  api.get("/status", (req, res) => res.json(status));
  api.get("/ping", (req, res) => res.json(status));

  api.get("/interfaces", async (req, res) => {
    const devices = await discoverDevices();
    res.json({
      ok: true,
      detected: true,
      software: "BrasilXMaster Bridge",
      interfaces: devices,
      message: "Bridge online em localhost:9999"
    });
  });

  api.post("/hardware/connect", (req, res) => {
    res.json({
      ok: true,
      detected: true,
      message: "Comando recebido",
      received: req.body
    });
  });

  api.listen(PORT, () => {
    console.log("BrasilXMaster Bridge rodando na porta " + PORT);
  });
}

function createWindow() {
  const win = new BrowserWindow({
    width: 1400,
    height: 900,
    title: "BrasilXMaster Bridge"
  });

  win.maximize();
  win.loadURL(SITE_URL);
}

app.whenReady().then(() => {
  startBridge();
  createWindow();
});

app.on("window-all-closed", () => {
  app.quit();
});
'@
          $code | Out-File src/main.js -Encoding utf8

      - name: Instalar dependências
        run: npm install --no-audit --no-fund

      - name: Gerar executável Windows
        run: npm run pack

      - name: Compactar resultado
        shell: powershell
        run: Compress-Archive -Path "dist/*" -DestinationPath BrasilXMaster-Bridge-Windows.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BrasilXMaster-Bridge-Windows
          path: BrasilXMaster-Bridge-Windows.zip
          retention-days: 30
